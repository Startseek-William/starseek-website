<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星索导航科技 - Starseek Navigation Technology</title>
  <meta name="description" content="深圳市星索导航科技有限公司 - 无人机抗干扰天线、无人机侦测反制、低空防护产品">
  <script>
    // Auto-redirect based on browser language
    (function() {
      var lang = navigator.language || navigator.userLanguage || '';
      var target = lang.toLowerCase().startsWith('zh') ? '/zh/' : '/en/';
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting... 跳转中...</p>
  <p><a href="/zh/">中文</a> | <a href="/en/">English</a></p>
</body>
</html>
